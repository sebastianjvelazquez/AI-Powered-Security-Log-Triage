version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: security_triage
      POSTGRES_USER: triage_user
      POSTGRES_PASSWORD: triage_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://triage_user:triage_pass@db:5432/security_triage
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
